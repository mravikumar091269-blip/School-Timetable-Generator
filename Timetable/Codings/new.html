<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Journey Steps</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;   /* Prevents both vertical and horizontal scrolling */
    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Poppins,sans-serif;

    background:
    radial-gradient(circle at top left,#60a5fa 0%,transparent 35%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 35%),
    linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #312e81
    );

    background-size:cover;
}

/* Make .journey a positioned container */
.journey{
    position:relative;
    width:min(1280px,96%);
    height:95vh;

    background:rgba(255,255,255,.92);
    backdrop-filter:blur(20px);

    border-radius:30px;

    padding:25px 45px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    box-shadow:0 30px 80px rgba(0,0,0,.25);

    animation:pageIn 1s ease forwards;
}

@keyframes pageIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Position the heading over the SVG */
.heading{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
    width: 90%;
}

/* 6. Animate the title gradient */
.journey h1{
    font-size:46px;
    font-weight:700;
    background:linear-gradient(135deg,#2563eb,#7c3aed, #2563eb);
    background-size:250%;
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    text-align:center;
    margin-bottom:8px;
    animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
    0%{ background-position:left; }
    100%{ background-position:right; }
}

.journey p{
    text-align:center;
    color:#777;
    font-size:17px;
    margin-bottom:15px;
}

/* Updated wrapper and svg as requested */
.wrapper{
    position:absolute;
    top:90px;          /* below heading */
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:1;
}

svg{
    width:94%;
    height:auto;       /* keeps original aspect ratio */
    overflow:visible;
    transform:scale(0.90);
    transform-origin:center;
}

.route{
    fill:none;
    stroke:url(#goldGradient);
    stroke-width:12;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:20 14;
    filter:drop-shadow(0 0 10px rgba(255,215,0,.35));
    stroke-dashoffset:2400;
    animation:
    draw 3s ease forwards,
    flow 16s linear infinite 3s;
}

/* 2 & 3. Stagger milestone appearance & float forever */
.pin{
    opacity:0;
}

.pin path,
.pin circle,
.pin ellipse,
.pin text{
    transform-box:fill-box;
    transform-origin:center;
}

.pin1{
    opacity:1;
    animation:drop .8s forwards .8s,
              floating 3s ease-in-out infinite .8s;
}

.pin2{
    opacity:1;
    animation:drop .8s forwards 1.5s,
              floating 3s ease-in-out infinite 1.5s;
}

.pin3{
    opacity:1;
    animation:drop .8s forwards 2.2s,
              floating 3s ease-in-out infinite 2.2s;
}

.label{
    font-size:24px;
    font-weight:700;
    fill:#233044;
    letter-spacing:.5px;
    text-anchor:middle;
}

@keyframes draw{
    to{ stroke-dashoffset:0; }
}

@keyframes flow{
    to{ stroke-dashoffset:-1800; }
}

@keyframes drop{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

@keyframes floating{
    0%,100%{
        filter:drop-shadow(0 0 0 rgba(0,0,0,0));
    }
    50%{
        filter:drop-shadow(0 0 10px rgba(255,215,0,.5));
    }
}

.pin path{
    transition:.4s;
}

.pin:hover path{
    fill:#C9A34E;
}

.pin:hover{
    cursor:pointer;
    filter:drop-shadow(0 0 18px rgba(201,163,78,.6));
}

.bg-circle{
    position:fixed;
    border-radius:50%;
    backdrop-filter:blur(10px);
    z-index:-1;
    animation:floatBg 10s ease-in-out infinite;
}

.circle1{
    width:220px;
    height:220px;
    background:rgba(255,255,255,.08);
    top:80px;
    left:80px;
}

.circle2{
    width:320px;
    height:320px;
    background:rgba(99,102,241,.15);
    right:80px;
    top:100px;
}

.circle3{
    width:180px;
    height:180px;
    background:rgba(16,185,129,.15);
    bottom:80px;
    left:45%;
}

/* 9. Make background circles rotate as well */
@keyframes floatBg{
    0%{
        transform:translateY(0) rotate(0deg);
    }
    50%{
        transform:translateY(-20px) rotate(180deg);
    }
    100%{
        transform:translateY(0) rotate(360deg);
    }
}

/* Updated start-wrapper as requested */
.start-wrapper{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
}

/* 8. Make the Start button shine */
.start-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    gap:12px;
    text-decoration:none;
    padding:18px 42px;
    border-radius:60px;
    font-size:19px;
    font-weight:600;
    color:white;
    background:linear-gradient(135deg,#10b981,#059669);
    box-shadow:0 15px 35px rgba(16,185,129,.35);
    transition:.35s;
    position:relative;
    overflow:hidden;
}

.start-btn span{
    display:inline-block;
}

.start-btn svg{
    width:24px;
    height:24px;
    flex-shrink:0;
    transition:.35s;
}

.start-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.4),
        transparent
    );
    transform:skewX(-25deg);
    animation:shine 3s infinite;
}

@keyframes shine{
    100%{ left:220%; }
}

.start-btn:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 22px 45px rgba(16,185,129,.45);
}

.start-btn:hover svg{
    transform:translateX(8px);
}

</style>

</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>
<div class="bg-circle circle3"></div>

<section class="journey">

<div class="heading">
    <h1>Create Your Timetable in 3 Simple Steps</h1>
    <p>Get your schedule up and running seamlessly</p>
</div>

<div class="wrapper">

<svg viewBox="0 0 1200 500">

<defs>

<filter id="shadow">
<feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".25"/>
</filter>

<linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#E7C56D"/>
<stop offset="50%" stop-color="#FFD86A"/>
<stop offset="100%" stop-color="#C79B35"/>
</linearGradient>

</defs>

<path
id="route"
class="route"
d="
M70 330
C180 150 280 150 380 250
C470 340 560 340 650 210
C760 80 860 120 960 220
C1030 290 1100 180 1140 90"
/>

<circle fill="#FFD86A">
<animateMotion dur="6s" repeatCount="indefinite">
<mpath href="#route"/>
</animateMotion>
<animate attributeName="r" values="11;15;11" dur="1s" repeatCount="indefinite"/>
<animate attributeName="opacity" values=".7;1;.7" dur="1s" repeatCount="indefinite"/>
</circle>

<circle r="6" fill="white">
<animateMotion dur="6s" begin="3s" repeatCount="indefinite">
<mpath href="#route"/>
</animateMotion>
</circle>


<g class="pin pin1" transform="translate(80 220)">
    <circle cx="0" cy="0" r="60" fill="#FFD86A22">
        <animate attributeName="r" values="55;70;55" dur="2s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="0" cy="48" rx="24" ry="8" fill="rgba(0,0,0,.18)"/>
    <path fill="url(#goldGradient)" filter="url(#shadow)" d="M0,-48 C25,-48 48,-25 48,0 C48,34 0,82 0,82 C0,82 -48,34 -48,0 C-48,-25 -25,-48 0,-48 Z"/>
    <circle cx="0" cy="-2" r="13" fill="white"/>
    <text x="0" y="3" font-size="14" font-weight="700" text-anchor="middle" fill="#C79B35" font-family="Poppins, sans-serif">1</text>
</g>
<text class="label" x="80" y="340">1. Select Classes</text>


<g class="pin pin2" transform="translate(600 170)">
    <circle cx="0" cy="0" r="60" fill="#FFD86A22">
        <animate attributeName="r" values="55;70;55" dur="2s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="0" cy="48" rx="24" ry="8" fill="rgba(0,0,0,.18)"/>
    <path fill="url(#goldGradient)" filter="url(#shadow)" d="M0,-48 C25,-48 48,-25 48,0 C48,34 0,82 0,82 C0,82 -48,34 -48,0 C-48,-25 -25,-48 0,-48 Z"/>
    <circle cx="0" cy="-2" r="13" fill="white"/>
    <text x="0" y="3" font-size="14" font-weight="700" text-anchor="middle" fill="#C79B35" font-family="Poppins, sans-serif">2</text>
</g>
<text class="label" x="600" y="290">2. Assign Teachers</text>


<g class="pin pin3" transform="translate(1120 90)">
    <circle cx="0" cy="0" r="60" fill="#FFD86A22">
        <animate attributeName="r" values="55;70;55" dur="2s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="0" cy="48" rx="24" ry="8" fill="rgba(0,0,0,.18)"/>
    <path fill="url(#goldGradient)" filter="url(#shadow)" d="M0,-48 C25,-48 48,-25 48,0 C48,34 0,82 0,82 C0,82 -48,34 -48,0 C-48,-25 -25,-48 0,-48 Z"/>
    <circle cx="0" cy="-2" r="13" fill="white"/>
    <text x="0" y="3" font-size="14" font-weight="700" text-anchor="middle" fill="#C79B35" font-family="Poppins, sans-serif">3</text>
</g>
<text class="label" x="1120" y="210">3. Generate Timetable</text>

</svg>

</div>

<div class="start-wrapper">
    <a href="index.html" class="start-btn">
        <span>Start Building</span>
        <svg width="24" height="24" viewBox="0 0 24 24">
            <path d="M5 12H19M13 6L19 12L13 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </a>
</div>

</section>

</body>
</html>
